<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - STICHCRAFT</title>
    <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css" />
    <link rel="stylesheet" href="/public/style.css">
    <style>
        #profile-section {
            padding: 80px;
            background: #f8f9fa;
            min-height: 60vh;
        }

        .profile-card {
            background: #fff;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 5px 25px rgba(0, 0, 0, 0.05);
            max-width: 600px;
            margin: 0 auto;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .profile-header i {
            font-size: 60px;
            color: #088178;
        }

        .info-group {
            margin-bottom: 20px;
        }

        .info-group label {
            display: block;
            font-size: 13px;
            color: #777;
            margin-bottom: 5px;
        }

        .info-group p {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin: 0;
        }

        .profile-actions {
            margin-top: 30px;
            display: flex;
            gap: 15px;
        }

        .btn-profile {
            padding: 12px 25px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-logout {
            background: #d8000c;
            color: #fff;
        }

        .btn-shop {
            background: #088178;
            color: #fff;
        }
    </style>
</head>

<body class="inner-page">
    <section id="header">
        <a href="Index.html"><img src="IMAGE/CraftLogo.png" class="logo" alt=""></a>
        <ul id="navbar">
            <li><a href="Index.html">Home</a></li>
            <li><a href="Shop.html">Shop</a></li>
            <li id="lg-bag"><a href="Cart.html"><i class="far fa-shopping-bag"></i></a></li>
        </ul>
    </section>

    <section id="profile-section">
        <div class="profile-card" id="user-info">
            <p style="text-align:center;">Loading your profile information...</p>
        </div>
    </section>

    <footer class="section-p1">
        <div class="copyright">
            <p>@2026, Stich Craft EMBROIDERY TRADITIONAL WORK</p>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const res = await fetch('/api/profile');
                if (!res.ok) {
                    window.location.href = 'Login.html';
                    return;
                }
                const user = await res.json();
                document.getElementById('user-info').innerHTML = `
                    <div class="profile-header">
                        <i class="fas fa-user-circle"></i>
                        <div>
                            <h2>Welcome, ${user.name}!</h2>
                            <p>Manage your account settings</p>
                        </div>
                    </div>
                    <div class="info-group">
                        <label>FULL NAME</label>
                        <p>${user.name}</p>
                    </div>
                    <div class="info-group">
                        <label>EMAIL ADDRESS</label>
                        <p>${user.email}</p>
                    </div>
                    <div class="profile-actions">
                        <a href="Shop.html" class="btn-profile btn-shop">Continue Shopping</a>
                        <a href="Cart.html" class="btn-profile" style="background: #efefef; color: #333;">My Cart</a>
                        <a href="#" onclick="logout()" class="btn-profile btn-logout">Logout</a>
                    </div>
                `;
            } catch (err) {
                console.error(err);
            }
        });
    </script>
</body>

</html>
